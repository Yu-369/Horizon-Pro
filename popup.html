<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360">
  <title>YouTube Pro Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="ytpro-popup">
    <header class="ytpro-header">
      <div class="ytpro-brand">
        <img src="Logo.png" class="ytpro-logo" alt="YouTube Pro Logo" style="width: 28px; height: 28px; border-radius: 4px; object-fit: cover;">
        <div>
          <h1 class="ytpro-title">YouTube Pro</h1>
          <p class="ytpro-version">v1.1.0</p>
        </div>
      </div>
    </header>
    <div class="ytpro-sections" id="sections"></div>
    <footer class="ytpro-footer"><span>All changes apply instantly</span></footer>
  </div>
  <script src="m3-switch.js"></script>
  <script src="popup.js"></script>
</body>
</html>
